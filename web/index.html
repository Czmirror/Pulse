<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pulse</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a14;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
    }
    canvas#bevy-canvas {
      display: block;
      /* Keep a square that fits the viewport */
      width: min(100vw, 100vh);
      height: min(100vw, 100vh);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="bevy-canvas"></canvas>
  <script type="module">
    import init from "./pulse.js";
    init().catch(console.error);
  </script>
</body>
</html>
