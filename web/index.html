<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pulse</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a14;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
    }
    canvas#bevy-canvas {
      display: block;
      /* Keep a square that fits the viewport */
      width: min(100vw, 100vh);
      height: min(100vw, 100vh);
      image-rendering: pixelated;
    }
    #error-panel {
      display: none;
      width: min(92vw, 560px);
      padding: 20px;
      border: 1px solid #3a4768;
      border-radius: 12px;
      background: rgba(10, 14, 26, 0.96);
      color: #eef3ff;
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      white-space: pre-wrap;
    }
    body.error canvas#bevy-canvas { display: none; }
    body.error #error-panel { display: block; }
    #error-panel strong { display: block; margin-bottom: 8px; font-size: 18px; }
    #error-panel code {
      display: block;
      margin-top: 12px;
      color: #9fc2ff;
      font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
    }
  </style>
</head>
<body>
  <canvas id="bevy-canvas"></canvas>
  <div id="error-panel" role="alert" aria-live="polite"></div>
  <script type="module">
    import init from "./pulse.js";

    const errorPanel = document.getElementById("error-panel");

    function showError(message, detail = "") {
      document.body.classList.add("error");
      errorPanel.innerHTML = `<strong>PULSE could not start.</strong>${message}${detail ? `<code>${detail}</code>` : ""}`;
    }

    function supportsWebGl2() {
      const canvas = document.createElement("canvas");
      return !!canvas.getContext("webgl2");
    }

    function supportsWebGpu() {
      return typeof navigator !== "undefined" && "gpu" in navigator;
    }

    if (!supportsWebGl2() && !supportsWebGpu()) {
      showError(
        "This browser does not support WebGL2 or WebGPU, so the game cannot render.",
        "Try the latest Chrome, Edge, or Safari."
      );
    } else {
      init().catch(console.error);
    }
  </script>
</body>
</html>
